<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Sikrer at siden er responsiv og tilpasser sig forskellige skærmstørrelser -->
    <title>TreDoegn</title>
     <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/6881ef30be.js" crossorigin="anonymous"></script> <!--Font Awesome for at kunne bruge ikoner i login knappen-->

</head>
<body>
    <div class="login">
    <div class="center">
        <button id="show-login">Log ind</button>
    </div>
    <div class="popup">
            <div class="close-btn">&times;</div>
            <div class="form">
                <h2>Log ind</h2>
                <div class="form-element">
                    <label for="email">Mail</label>
                    <input type="text" id="email" placeholder="Indtast mailadresse">
                </div>
                <div class="form-element">
                    <label for="password">Kodeord</label>
                    <input type="password" id="password" placeholder="Indtast kodeord">
                </div>
                <div class="form-element">
                    <input type="checkbox" id="remember-me">
                    <label for="remember-me">Husk mig  </label>
                </div>
                <div class="form-element">
                    <button>Log ind</button>
                </div>
                <div class="form-element">
                    <a href="#">Glemt kodeord?</a>
                </div>
            </div>
        </div>
    </div>
</body>

     <script src="script.js"></script>
